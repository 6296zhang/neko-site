<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenArt Story — Storyboard</title>
<style>
:root {
  --accent: #7c5cfc;
  --accent2: #a78bfa;
  --pink: #e879a0;
  --green: #34d399;
  --yellow: #fbbf24;
  --bg: #0d0d10;
  --surface: #141418;
  --surface2: #1c1c22;
  --surface3: #242430;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f5;
  --text2: #8888a0;
  --text3: #44445a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* NAV */
.nav { height: 48px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; }
.nav-left { display: flex; align-items: center; gap: 12px; }
.logo { display: flex; align-items: center; gap: 7px; font-weight: 700; font-size: 14px; }
.logo-dot { width: 22px; height: 22px; background: linear-gradient(135deg, var(--accent), var(--pink)); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; }
.story-name input { background: transparent; border: none; border-bottom: 1px solid transparent; color: var(--text2); font-size: 13px; font-weight: 500; outline: none; width: 160px; padding: 2px 0; transition: all .15s; }
.story-name input:focus { border-bottom-color: var(--accent); color: var(--text); }
.divider { width: 1px; height: 20px; background: var(--border2); }
.nav-tabs { display: flex; gap: 2px; }
.nav-tab { padding: 6px 14px; border-radius: 6px; font-size: 13px; color: var(--text2); cursor: pointer; transition: all .15s; }
.nav-tab:hover { color: var(--text); background: var(--surface2); }
.nav-tab.active { color: var(--text); background: var(--surface3); }
.nav-right { display: flex; align-items: center; gap: 8px; }
.credits { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text2); padding: 4px 8px; background: var(--surface2); border-radius: 6px; }
.credits span { color: var(--yellow); font-size: 10px; }
.nav-btn { padding: 6px 14px; border-radius: 7px; font-size: 12px; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text2); transition: all .15s; }
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--pink)); display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }

/* CONTENT */
.content { flex: 1; overflow-y: auto; padding: 24px 28px 100px; }
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

/* SCENE ROW */
.scene-row { margin-bottom: 24px; }
.scene-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.scene-num { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; }
.scene-title-input { background: transparent; border: none; border-bottom: 1px solid transparent; color: var(--text2); font-size: 13px; font-weight: 500; outline: none; padding: 2px 0; width: 180px; transition: all .15s; }
.scene-title-input:focus { border-bottom-color: var(--accent); color: var(--text); }
.scene-title-input::placeholder { color: var(--text3); }
.scene-line { flex: 1; height: 1px; background: var(--border); }
.scene-add-shot { font-size: 11px; color: var(--text3); cursor: pointer; padding: 3px 8px; border-radius: 5px; border: 1px solid var(--border); transition: all .15s; white-space: nowrap; }
.scene-add-shot:hover { color: var(--accent2); border-color: rgba(124,92,252,.3); }

/* SCENE CARD */
.scene-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: border-color .2s; }
.scene-card.has-content { border-color: var(--border); }

/* COMPOSE AREA — inside scene card, empty state */
.compose-area { padding: 20px 20px 16px; }
.compose-textarea {
  width: 100%; background: transparent; border: none; color: var(--text);
  font-size: 14px; line-height: 1.7; outline: none; resize: none;
  font-family: inherit; min-height: 72px;
}
.compose-textarea::placeholder { color: var(--text3); font-size: 14px; }

.compose-params {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  padding: 10px 20px 10px; border-top: 1px solid var(--border);
}
.param-chip { display: flex; align-items: center; gap: 5px; padding: 5px 11px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px; font-size: 11px; color: var(--text2); cursor: pointer; transition: all .15s; white-space: nowrap; }
.param-chip:hover { border-color: var(--accent2); color: var(--text); }

.compose-actions {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px 14px;
}
.compose-actions-left { display: flex; align-items: center; gap: 8px; }
.manual-btn { display: flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 7px; font-size: 12px; color: var(--text2); border: 1px solid var(--border2); background: transparent; cursor: pointer; transition: all .15s; }
.manual-btn:hover { background: var(--surface2); color: var(--text); }
.or-text { font-size: 11px; color: var(--text3); }

.gen-btn { padding: 9px 22px; border-radius: 9px; font-size: 13px; font-weight: 700; background: linear-gradient(135deg, var(--accent), #9d6fff); color: white; border: none; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: all .2s; opacity: .35; pointer-events: none; }
.gen-btn.ready { opacity: 1; pointer-events: auto; }
.gen-btn.ready:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,92,252,.45); }

/* SHOTS STRIP */
.shots-strip { display: flex; gap: 8px; padding: 16px 16px; flex-wrap: nowrap; overflow-x: auto; border-top: 1px solid var(--border); }
.shots-strip::-webkit-scrollbar { height: 3px; }
.shots-strip::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.shot-thumb { width: 160px; flex-shrink: 0; border-radius: 10px; overflow: hidden; border: 2px solid transparent; cursor: pointer; transition: all .15s; background: var(--surface2); }
.shot-thumb:hover { border-color: rgba(124,92,252,.4); }
.shot-thumb-img { aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; overflow: hidden; }
.shot-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; gap: 5px; opacity: 0; transition: opacity .15s; }
.shot-thumb:hover .shot-overlay { opacity: 1; }
.shot-ov-btn { padding: 4px 9px; background: rgba(255,255,255,.9); color: #1a1a2e; border-radius: 5px; font-size: 10px; font-weight: 600; }
.shot-info { padding: 6px 8px; }
.shot-num { font-size: 10px; font-weight: 700; color: var(--text3); margin-bottom: 2px; }
.shot-desc { font-size: 10px; color: var(--text2); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.shot-add-tile { width: 160px; flex-shrink: 0; border-radius: 10px; border: 1.5px dashed var(--border2); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; color: var(--text3); transition: all .15s; font-size: 11px; aspect-ratio: 16/9; }
.shot-add-tile:hover { border-color: var(--accent); color: var(--accent2); background: rgba(124,92,252,.04); }

/* ADD SCENE */
.add-scene-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1.5px dashed var(--border2); border-radius: 8px; font-size: 12px; color: var(--text3); cursor: pointer; transition: all .15s; }
.add-scene-btn:hover { border-color: var(--accent); color: var(--accent2); background: rgba(124,92,252,.04); }

/* BOTTOM BAR */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 52px; background: var(--surface); border-top: 1px solid var(--border2); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
.bottom-left { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 8px; }
.progress-bar { width: 80px; height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--pink)); border-radius: 2px; width: 0%; transition: width .4s; }
.bottom-right { display: flex; gap: 8px; }
.bbtn { padding: 7px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
.bbtn.sec { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
.bbtn.sec:hover { background: var(--surface3); color: var(--text); }
.bbtn.pri { background: linear-gradient(135deg, var(--accent), #9d6fff); color: white; }
.bbtn.pri:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(124,92,252,.4); }

/* bgs */
.bg-night { background: linear-gradient(160deg, #0a0a1a, #1a1040, #0d1a2a); }
.bg-castle { background: linear-gradient(160deg, #1a0a20, #2d1540, #1a0a30); }
.bg-forest { background: linear-gradient(160deg, #0a1f0a, #0d2d0d, #1a3a15); }
.bg-golden { background: linear-gradient(160deg, #2a1800, #3d2800, #1a1000); }

@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
.gen-pulse { animation: pulse 1s ease-in-out infinite; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.fade-up { animation: fadeUp .2s ease forwards; }

/* TOAST */
.toast { position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--surface3); border: 1px solid var(--border2); border-radius: 10px; padding: 8px 16px; font-size: 12px; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,.4); transition: transform .25s; z-index: 200; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <div class="logo"><div class="logo-dot">✦</div> OpenArt</div>
    <div class="divider"></div>
    <div class="story-name"><input type="text" id="story-title" placeholder="Untitled Story" /></div>
    <div class="divider"></div>
    <div class="nav-tabs">
      <div class="nav-tab active">Storyboard</div>
      <div class="nav-tab" onclick="toast('Timeline...')">Timeline</div>
    </div>
  </div>
  <div class="nav-right">
    <div class="credits"><span>✦</span> 268,860</div>
    <button class="nav-btn">Share</button>
    <div class="avatar">🧝</div>
  </div>
</nav>

<div class="content" id="content">

  <!-- Scene 1 — starts with compose area -->
  <div class="scene-row" id="scene-row-1">
    <div class="scene-header">
      <div class="scene-num">Scene 1</div>
      <input class="scene-title-input" type="text" placeholder="Scene title..." />
      <div class="scene-line"></div>
      <div class="scene-add-shot" onclick="addManualShot(1)">+ Add Shot</div>
    </div>

    <div class="scene-card" id="scene-card-1">
      <!-- Compose area -->
      <div class="compose-area" id="compose-1">
        <textarea class="compose-textarea" id="ta-1" rows="3"
          placeholder="Describe this scene — what's happening, where, what mood..."
          oninput="onInput(this, 'gbtn-1')"></textarea>

        <div class="compose-params">
          <div class="param-chip" onclick="toast('Characters & worlds...')">👤 Characters & worlds</div>
          <div class="param-chip" onclick="toast('Reference images...')">📎 Reference</div>
          <div class="param-chip" onclick="toast('Style...')">🎨 Photographic</div>
          <div class="param-chip" id="cc-1" onclick="cycleCount('cc-1')">🎬 Auto · 3 shots</div>
        </div>

        <div class="compose-actions">
          <div class="compose-actions-left">
            <div class="manual-btn" onclick="addManualShot(1)">＋ Add shot manually</div>
            <div class="or-text">or</div>
            <div class="manual-btn" onclick="toast('Import media...')">⬆ Import</div>
          </div>
          <button class="gen-btn" id="gbtn-1" onclick="generateScene(1)">✦ Generate Scene</button>
        </div>
      </div>

      <!-- Shots strip (hidden until generated) -->
      <div class="shots-strip" id="strip-1" style="display:none"></div>
    </div>
  </div>

  <div id="more-scenes"></div>
  <div class="add-scene-btn" id="add-scene-btn" style="display:none" onclick="addScene()">+ Add Scene</div>

</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar" id="bottom-bar" style="display:none">
  <div class="bottom-left">
    <span id="progress-text">0 shots complete</span>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <div class="bottom-right">
    <button class="bbtn sec" onclick="addScene()">+ Add Scene</button>
    <button class="bbtn pri" onclick="toast('Creating videos...')">✦ Create Videos</button>
  </div>
</div>

<div class="toast" id="toast-el"></div>

<script>
const SHOTS = {
  a: [
    { bg:'bg-night', icon:'🌃', desc:'Wide: Lumina walks alone through neon-lit streets at night' },
    { bg:'bg-night', icon:'🧝', desc:'Close-up: She pauses, looks up at city signs, wistful expression' },
    { bg:'bg-night', icon:'✨', desc:'Pull back: City skyline behind her, a small figure in the vast night' },
  ],
  b: [
    { bg:'bg-castle', icon:'📖', desc:'Lumina opens an ancient glowing book, golden text rises from the pages' },
    { bg:'bg-castle', icon:'🧝', desc:'Her face bathed in golden light, eyes wide with recognition' },
    { bg:'bg-castle', icon:'⚡', desc:'The library trembles as magic surges outward' },
  ],
};
const countOpts = ['Auto · 2 shots','Auto · 3 shots','Auto · 4 shots'];
let countIdxMap = {};
let sceneCount = 1;
let totalShots = 0, doneShots = 0;
let setAB = 'a';

function onInput(ta, btnId) {
  document.getElementById(btnId).classList.toggle('ready', ta.value.trim().length > 0);
}

function cycleCount(id) {
  countIdxMap[id] = ((countIdxMap[id] || 1) + 1) % countOpts.length;
  document.getElementById(id).innerHTML = `🎬 ${countOpts[countIdxMap[id]]}`;
}

function generateScene(sid) {
  const ta = document.getElementById('ta-'+sid);
  if (!ta.value.trim()) return;

  // auto-title from input
  if (!document.getElementById('story-title').value) {
    document.getElementById('story-title').value = ta.value.trim().slice(0,40);
  }

  // hide compose, show strip
  document.getElementById('compose-'+sid).style.display = 'none';
  const strip = document.getElementById('strip-'+sid);
  strip.style.display = 'flex';
  strip.innerHTML = `<div style="display:flex;align-items:center;gap:10px;padding:10px 4px;color:var(--text3);font-size:12px"><span class="gen-pulse" style="color:var(--accent2);font-size:18px">✦</span> Generating shots...</div>`;

  // show bottom bar & add scene btn
  document.getElementById('bottom-bar').style.display = 'flex';
  document.getElementById('add-scene-btn').style.display = 'inline-flex';

  const shots = SHOTS[setAB];
  setAB = setAB === 'a' ? 'b' : 'a';
  let count = 0;

  const iv = setInterval(() => {
    count++;
    if (count > shots.length) {
      clearInterval(iv);
      // add tile
      const tile = document.createElement('div');
      tile.className = 'shot-add-tile fade-up';
      tile.innerHTML = `<span style="font-size:16px">+</span><span>Add Shot</span>`;
      tile.onclick = () => addManualShot(sid);
      strip.appendChild(tile);
      totalShots += shots.length; doneShots += shots.length;
      updateProgress();
      toast(`✦ ${shots.length} shots ready`);
      return;
    }
    if (count === 1) strip.innerHTML = '';
    const s = shots[count-1];
    const el = document.createElement('div');
    el.className = 'shot-thumb fade-up';
    el.innerHTML = `
      <div class="shot-thumb-img ${s.bg}">
        <span style="font-size:24px">${s.icon}</span>
        <div class="shot-overlay">
          <div class="shot-ov-btn">Edit</div>
          <div class="shot-ov-btn">Regen</div>
        </div>
      </div>
      <div class="shot-info">
        <div class="shot-num">Shot ${sid}.${count}</div>
        <div class="shot-desc">${s.desc}</div>
      </div>`;
    el.onclick = () => toast(`Opening Shot ${sid}.${count}...`);
    strip.appendChild(el);
  }, 700);
}

function addManualShot(sid) {
  let strip = document.getElementById('strip-'+sid);

  // if compose still showing, hide it first
  const compose = document.getElementById('compose-'+sid);
  if (compose && compose.style.display !== 'none') {
    compose.style.display = 'none';
    strip.style.display = 'flex';
    strip.innerHTML = '';
    // add tile
    const tile = document.createElement('div');
    tile.className = 'shot-add-tile';
    tile.innerHTML = `<span style="font-size:16px">+</span><span>Add Shot</span>`;
    tile.onclick = () => addManualShot(sid);
    strip.appendChild(tile);
    document.getElementById('bottom-bar').style.display = 'flex';
    document.getElementById('add-scene-btn').style.display = 'inline-flex';
  }

  const existing = strip.querySelectorAll('.shot-thumb').length;
  const tile = strip.querySelector('.shot-add-tile');
  const el = document.createElement('div');
  el.className = 'shot-thumb fade-up';
  el.innerHTML = `
    <div class="shot-thumb-img" style="background:var(--surface3)">
      <div style="text-align:center;color:var(--text3)">
        <div style="font-size:16px;margin-bottom:3px">+</div>
        <div style="font-size:10px">Write prompt</div>
      </div>
    </div>
    <div class="shot-info">
      <div class="shot-num">Shot ${sid}.${existing+1}</div>
      <div class="shot-desc" style="color:var(--text3)">Empty · click to edit</div>
    </div>`;
  el.onclick = () => toast('Opening shot editor...');
  if (tile) strip.insertBefore(el, tile);
  else strip.appendChild(el);
  totalShots++; updateProgress();
  toast('Shot added');
}

function addScene() {
  sceneCount++;
  const n = sceneCount;
  const container = document.getElementById('more-scenes');
  const addBtn = document.getElementById('add-scene-btn');

  const div = document.createElement('div');
  div.className = 'scene-row fade-up';
  div.innerHTML = `
    <div class="scene-header">
      <div class="scene-num">Scene ${n}</div>
      <input class="scene-title-input" type="text" placeholder="Scene title..." />
      <div class="scene-line"></div>
      <div class="scene-add-shot" onclick="addManualShot(${n})">+ Add Shot</div>
    </div>
    <div class="scene-card" id="scene-card-${n}">
      <div class="compose-area" id="compose-${n}">
        <textarea class="compose-textarea" id="ta-${n}" rows="3"
          placeholder="Describe this scene..."
          oninput="onInput(this,'gbtn-${n}')"></textarea>
        <div class="compose-params">
          <div class="param-chip" onclick="toast('Characters...')">👤 Characters & worlds</div>
          <div class="param-chip" onclick="toast('Reference...')">📎 Reference</div>
          <div class="param-chip" onclick="toast('Style...')">🎨 Photographic</div>
          <div class="param-chip" id="cc-${n}" onclick="cycleCount('cc-${n}')">🎬 Auto · 3 shots</div>
        </div>
        <div class="compose-actions">
          <div class="compose-actions-left">
            <div class="manual-btn" onclick="addManualShot(${n})">＋ Add shot manually</div>
            <div class="or-text">or</div>
            <div class="manual-btn" onclick="toast('Import...')">⬆ Import</div>
          </div>
          <button class="gen-btn" id="gbtn-${n}" onclick="generateScene(${n})">✦ Generate Scene</button>
        </div>
      </div>
      <div class="shots-strip" id="strip-${n}" style="display:none"></div>
    </div>`;

  container.insertBefore(div, addBtn);
  div.querySelector('textarea').focus();
  div.scrollIntoView({ behavior:'smooth', block:'start' });
}

function updateProgress() {
  document.getElementById('progress-text').textContent = `${doneShots} / ${totalShots} shots`;
  const pct = totalShots > 0 ? (doneShots/totalShots)*100 : 0;
  document.getElementById('progress-fill').style.width = pct+'%';
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast-el');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('ta-1').focus();
});
</script>
</body>
</html>
