<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenArt Story — New Project</title>
<style>
:root {
  --accent: #7c5cfc;
  --accent2: #a78bfa;
  --pink: #e879a0;
  --green: #34d399;
  --yellow: #fbbf24;
  --bg: #0d0d10;
  --surface: #141418;
  --surface2: #1c1c22;
  --surface3: #242430;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f5;
  --text2: #8888a0;
  --text3: #44445a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── NAV ── */
.nav { height: 48px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; }
.nav-left { display: flex; align-items: center; gap: 12px; }
.logo { display: flex; align-items: center; gap: 7px; font-weight: 700; font-size: 14px; }
.logo-dot { width: 22px; height: 22px; background: linear-gradient(135deg, var(--accent), var(--pink)); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; }
.story-name input { background: transparent; border: none; border-bottom: 1px solid transparent; color: var(--text2); font-size: 13px; font-weight: 500; outline: none; width: 160px; padding: 2px 0; transition: all .15s; }
.story-name input:focus { border-bottom-color: var(--accent); color: var(--text); }
.divider { width: 1px; height: 20px; background: var(--border2); }
.nav-tabs { display: flex; gap: 2px; }
.nav-tab { padding: 6px 14px; border-radius: 6px; font-size: 13px; color: var(--text2); cursor: pointer; transition: all .15s; }
.nav-tab:hover { color: var(--text); background: var(--surface2); }
.nav-tab.active { color: var(--text); background: var(--surface3); }
.nav-right { display: flex; align-items: center; gap: 8px; }
.credits { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text2); padding: 4px 8px; background: var(--surface2); border-radius: 6px; }
.credits span { color: var(--yellow); font-size: 10px; }
.nav-btn { padding: 6px 14px; border-radius: 7px; font-size: 12px; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text2); transition: all .15s; }
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--pink)); display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }

/* ── CONTENT ── */
.content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

/* ── EMPTY STATE ── */
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; gap: 0; }

.empty-scene-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 20px; }

/* Main compose area */
.compose-card {
  width: 100%; max-width: 640px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 16px; overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,.4);
  transition: border-color .2s;
}
.compose-card.active { border-color: rgba(124,92,252,.4); box-shadow: 0 8px 40px rgba(0,0,0,.4), 0 0 0 3px rgba(124,92,252,.08); }

.compose-inner { padding: 20px 20px 14px; }
.compose-textarea {
  width: 100%; background: transparent; border: none; color: var(--text);
  font-size: 15px; line-height: 1.7; outline: none; resize: none;
  font-family: inherit; min-height: 88px;
}
.compose-textarea::placeholder { color: var(--text3); font-size: 15px; }

.compose-params {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  padding: 10px 20px; border-top: 1px solid var(--border);
}
.param-chip {
  display: flex; align-items: center; gap: 5px; padding: 5px 11px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 20px; font-size: 11px; color: var(--text2);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.param-chip:hover { border-color: var(--accent2); color: var(--text); }

.compose-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-top: 1px solid var(--border);
  background: var(--surface2);
}
.compose-footer-left { font-size: 11px; color: var(--text3); }
.compose-footer-left span { color: var(--text2); }

.gen-btn {
  padding: 9px 22px; border-radius: 9px; font-size: 13px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #9d6fff); color: white;
  border: none; cursor: pointer; display: flex; align-items: center; gap: 7px;
  transition: all .2s; opacity: .35; pointer-events: none;
}
.gen-btn.ready { opacity: 1; pointer-events: auto; }
.gen-btn.ready:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,92,252,.45); }

/* OR row */
.or-row {
  display: flex; align-items: center; gap: 16px; margin-top: 20px;
  width: 100%; max-width: 640px;
}
.or-line { flex: 1; height: 1px; background: var(--border); }
.or-text { font-size: 11px; color: var(--text3); white-space: nowrap; }

/* Manual actions */
.manual-actions { display: flex; gap: 8px; margin-top: 16px; }
.manual-action {
  display: flex; align-items: center; gap: 7px; padding: 8px 16px;
  border-radius: 9px; font-size: 12px; color: var(--text2);
  border: 1px solid var(--border2); background: var(--surface);
  cursor: pointer; transition: all .15s;
}
.manual-action:hover { border-color: var(--border2); background: var(--surface2); color: var(--text); }
.manual-action-icon { font-size: 14px; }

/* ── STORYBOARD STATE (after content) ── */
.storyboard { display: none; flex-direction: column; padding: 20px 24px 100px; gap: 0; }
.storyboard.show { display: flex; }

/* Scene row */
.scene-row { margin-bottom: 24px; }
.scene-row-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.scene-row-num { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; }
.scene-row-title { font-size: 13px; font-weight: 500; color: var(--text2); }
.scene-row-line { flex: 1; height: 1px; background: var(--border); }
.scene-row-add { font-size: 11px; color: var(--text3); cursor: pointer; padding: 3px 8px; border-radius: 5px; border: 1px solid var(--border); transition: all .15s; }
.scene-row-add:hover { color: var(--accent2); border-color: rgba(124,92,252,.3); }

.shots-strip { display: flex; gap: 8px; align-items: flex-start; }

/* Shot thumb */
.shot-thumb {
  width: 160px; flex-shrink: 0; border-radius: 10px; overflow: hidden;
  border: 2px solid transparent; cursor: pointer; transition: all .15s;
  background: var(--surface);
}
.shot-thumb:hover { border-color: rgba(124,92,252,.4); }
.shot-thumb-img {
  aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center;
  font-size: 24px; position: relative; overflow: hidden;
}
.shot-thumb-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,.55);
  display: flex; align-items: center; justify-content: center; gap: 5px;
  opacity: 0; transition: opacity .15s;
}
.shot-thumb:hover .shot-thumb-overlay { opacity: 1; }
.shot-ov-btn { padding: 4px 9px; background: rgba(255,255,255,.9); color: #1a1a2e; border-radius: 5px; font-size: 10px; font-weight: 600; }
.shot-thumb-info { padding: 6px 8px; }
.shot-thumb-num { font-size: 10px; font-weight: 700; color: var(--text3); margin-bottom: 2px; }
.shot-thumb-desc { font-size: 10px; color: var(--text2); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* Add shot tile */
.shot-add-tile {
  width: 160px; flex-shrink: 0; aspect-ratio: 16/9;
  border-radius: 10px; border: 1.5px dashed var(--border2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; cursor: pointer; color: var(--text3); transition: all .15s; font-size: 11px;
}
.shot-add-tile:hover { border-color: var(--accent); color: var(--accent2); background: rgba(124,92,252,.04); }

/* Add scene btn */
.add-scene-row { padding: 0 0 12px; }
.add-scene-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1.5px dashed var(--border2); border-radius: 8px; font-size: 12px; color: var(--text3); cursor: pointer; transition: all .15s; }
.add-scene-btn:hover { border-color: var(--accent); color: var(--accent2); background: rgba(124,92,252,.04); }

/* Bottom bar */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 52px; background: var(--surface); border-top: 1px solid var(--border2); display: none; align-items: center; justify-content: space-between; padding: 0 20px; }
.bottom-bar.show { display: flex; }
.bottom-left { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text3); }
.bottom-progress { display: flex; align-items: center; gap: 8px; }
.progress-bar { width: 80px; height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--pink)); border-radius: 2px; transition: width .3s; }
.bottom-right { display: flex; align-items: center; gap: 8px; }
.bottom-btn { padding: 7px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
.bottom-btn.secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
.bottom-btn.secondary:hover { background: var(--surface3); color: var(--text); }
.bottom-btn.primary { background: linear-gradient(135deg, var(--accent), #9d6fff); color: white; }
.bottom-btn.primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(124,92,252,.4); }

/* bg colors */
.bg-night { background: linear-gradient(160deg, #0a0a1a, #1a1040, #0d1a2a); }
.bg-castle { background: linear-gradient(160deg, #1a0a20, #2d1540, #1a0a30); }
.bg-forest { background: linear-gradient(160deg, #0a1f0a, #0d2d0d, #1a3a15); }
.bg-golden { background: linear-gradient(160deg, #2a1800, #3d2800, #1a1000); }

/* Generating */
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
.gen-pulse { animation: pulse 1s ease-in-out infinite; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.fade-up { animation: fadeUp .25s ease forwards; }

/* Toast */
.toast { position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--surface3); border: 1px solid var(--border2); border-radius: 10px; padding: 8px 16px; font-size: 12px; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,.4); transition: transform .25s; z-index: 200; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-left">
    <div class="logo"><div class="logo-dot">✦</div> OpenArt</div>
    <div class="divider"></div>
    <div class="story-name"><input type="text" id="story-title" placeholder="Untitled Story" /></div>
    <div class="divider"></div>
    <div class="nav-tabs">
      <div class="nav-tab active">Storyboard</div>
      <div class="nav-tab" onclick="toast('Timeline...')">Timeline</div>
    </div>
  </div>
  <div class="nav-right">
    <div class="credits"><span>✦</span> 268,860</div>
    <button class="nav-btn">Share</button>
    <div class="avatar">🧝</div>
  </div>
</nav>

<!-- CONTENT -->
<div class="content" id="content">

  <!-- ── EMPTY STATE ── -->
  <div class="empty-state" id="empty-state">

    <div class="empty-scene-label">Scene 1</div>

    <!-- Compose card -->
    <div class="compose-card" id="compose-card">
      <div class="compose-inner">
        <textarea class="compose-textarea" id="main-ta" rows="4"
          placeholder="Describe your first scene...&#10;What's happening? Where? What mood?"
          oninput="onMainInput(this)"></textarea>
      </div>

      <div class="compose-params">
        <div class="param-chip" onclick="toast('Characters & worlds...')">👤 Characters & worlds</div>
        <div class="param-chip" onclick="toast('Add reference images...')">📎 Reference images</div>
        <div class="param-chip" onclick="toast('Choose style...')">🎨 Photographic</div>
        <div class="param-chip" id="shot-count" onclick="cycleCount()">🎬 Auto · 3 shots</div>
      </div>

      <div class="compose-footer">
        <div class="compose-footer-left">
          AI will generate <span>shot scripts</span> first · then images
        </div>
        <button class="gen-btn" id="main-gen-btn" onclick="startGenerate()">
          ✦ Generate Scene
        </button>
      </div>
    </div>

    <!-- OR -->
    <div class="or-row">
      <div class="or-line"></div>
      <div class="or-text">or start manually</div>
      <div class="or-line"></div>
    </div>

    <!-- Manual actions -->
    <div class="manual-actions">
      <div class="manual-action" onclick="addManualShot()">
        <span class="manual-action-icon">＋</span>
        Add a shot
      </div>
      <div class="manual-action" onclick="toast('Import media...')">
        <span class="manual-action-icon">⬆</span>
        Import media
      </div>
    </div>

  </div>

  <!-- ── STORYBOARD STATE ── -->
  <div class="storyboard" id="storyboard">
    <div id="scenes-container"></div>
    <div class="add-scene-row">
      <div class="add-scene-btn" onclick="addScene()">+ Add Scene</div>
    </div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar" id="bottom-bar">
  <div class="bottom-left">
    <div class="bottom-progress">
      <span id="progress-text">0 / 0 shots complete</span>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="bottom-right">
    <button class="bottom-btn secondary" onclick="addScene()">+ Add Scene</button>
    <button class="bottom-btn primary" onclick="toast('Converting all to video...')">✦ Create Videos</button>
  </div>
</div>

<div class="toast" id="toast-el"></div>

<script>
const SHOTS_DATA = [
  { bg:'bg-night', icon:'🌃', desc:'Wide: Lumina walks alone through neon-lit streets at night' },
  { bg:'bg-night', icon:'🧝', desc:'Close-up: She pauses, looks up at glowing city signs, wistful expression' },
  { bg:'bg-night', icon:'✨', desc:'Pull back: City skyline behind her, a small figure in the vast urban night' },
];
const SHOTS_DATA_2 = [
  { bg:'bg-castle', icon:'📖', desc:'Lumina opens an ancient glowing book, golden text rises from pages' },
  { bg:'bg-castle', icon:'🧝', desc:'Her face bathed in golden light, eyes wide with recognition' },
  { bg:'bg-castle', icon:'⚡', desc:'The library trembles as magic surges outward' },
];

const countCycles = ['Auto · 2 shots','Auto · 3 shots','Auto · 4 shots'];
let countIdx = 1;
let sceneCount = 0;
let totalShots = 0;
let doneShots = 0;

function onMainInput(ta) {
  const btn = document.getElementById('main-gen-btn');
  const card = document.getElementById('compose-card');
  const hasText = ta.value.trim().length > 0;
  btn.classList.toggle('ready', hasText);
  card.classList.toggle('active', hasText);
}

function cycleCount() {
  countIdx = (countIdx + 1) % countCycles.length;
  document.getElementById('shot-count').innerHTML = `🎬 ${countCycles[countIdx]}`;
}

function startGenerate() {
  const ta = document.getElementById('main-ta');
  if (!ta.value.trim()) return;
  const title = ta.value.trim().slice(0, 40);
  document.getElementById('story-title').value = title;

  // switch to storyboard
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('storyboard').classList.add('show');
  document.getElementById('bottom-bar').classList.add('show');

  addSceneWithGenerate(1, 'Scene 1', SHOTS_DATA);
}

function addSceneWithGenerate(num, label, shotsData) {
  sceneCount++;
  const container = document.getElementById('scenes-container');

  const div = document.createElement('div');
  div.className = 'scene-row fade-up';
  div.id = `scene-row-${num}`;
  div.innerHTML = `
    <div class="scene-row-header">
      <div class="scene-row-num">Scene ${num}</div>
      <div class="scene-row-title" id="scene-title-${num}">${label}</div>
      <div class="scene-row-line"></div>
      <div class="scene-row-add" onclick="addShotToScene(${num})">+ Add Shot</div>
    </div>
    <div class="shots-strip" id="strip-${num}">
      <div style="display:flex;align-items:center;gap:10px;padding:20px;color:var(--text3);font-size:12px">
        <span class="gen-pulse" style="color:var(--accent2);font-size:18px">✦</span>
        Generating shots...
      </div>
    </div>`;

  container.appendChild(div);

  // simulate generating shots one by one
  let count = 0;
  const strip = document.getElementById(`strip-${num}`);

  const iv = setInterval(() => {
    count++;
    if (count > shotsData.length) {
      clearInterval(iv);
      // add "add shot" tile
      const tile = document.createElement('div');
      tile.className = 'shot-add-tile fade-up';
      tile.innerHTML = `<span style="font-size:16px">+</span><span>Add Shot</span>`;
      tile.onclick = () => addShotToScene(num);
      strip.appendChild(tile);
      totalShots += shotsData.length;
      doneShots += shotsData.length;
      updateProgress();
      toast(`✦ Scene ${num} ready · ${shotsData.length} shots generated`);
      return;
    }

    // clear loading on first shot
    if (count === 1) strip.innerHTML = '';

    const s = shotsData[count - 1];
    const thumb = document.createElement('div');
    thumb.className = 'shot-thumb fade-up';
    thumb.innerHTML = `
      <div class="shot-thumb-img ${s.bg}">
        <span style="font-size:24px">${s.icon}</span>
        <div class="shot-thumb-overlay">
          <div class="shot-ov-btn">Edit</div>
          <div class="shot-ov-btn">Regen</div>
        </div>
      </div>
      <div class="shot-thumb-info">
        <div class="shot-thumb-num">Shot ${num}.${count}</div>
        <div class="shot-thumb-desc">${s.desc}</div>
      </div>`;
    thumb.onclick = () => toast(`Opening Shot ${num}.${count}...`);
    strip.appendChild(thumb);
  }, 700);
}

function addShotToScene(sceneNum) {
  const strip = document.getElementById(`strip-${sceneNum}`);
  const existing = strip.querySelectorAll('.shot-thumb').length;
  const tile = strip.querySelector('.shot-add-tile');

  const thumb = document.createElement('div');
  thumb.className = 'shot-thumb fade-up';
  thumb.innerHTML = `
    <div class="shot-thumb-img" style="background:var(--surface2)">
      <div style="text-align:center;color:var(--text3)">
        <div style="font-size:16px;margin-bottom:3px">+</div>
        <div style="font-size:10px">Write prompt</div>
      </div>
    </div>
    <div class="shot-thumb-info">
      <div class="shot-thumb-num">Shot ${sceneNum}.${existing+1}</div>
      <div class="shot-thumb-desc" style="color:var(--text3)">Empty · click to edit</div>
    </div>`;
  thumb.onclick = () => toast('Opening shot editor...');

  if (tile) strip.insertBefore(thumb, tile);
  else strip.appendChild(thumb);

  totalShots++;
  updateProgress();
  toast('Shot added');
}

function addManualShot() {
  // switch to storyboard with empty scene
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('storyboard').classList.add('show');
  document.getElementById('bottom-bar').classList.add('show');

  sceneCount++;
  const container = document.getElementById('scenes-container');
  const div = document.createElement('div');
  div.className = 'scene-row fade-up';
  div.innerHTML = `
    <div class="scene-row-header">
      <div class="scene-row-num">Scene 1</div>
      <div class="scene-row-line"></div>
      <div class="scene-row-add" onclick="addShotToScene(99)">+ Add Shot</div>
    </div>
    <div class="shots-strip" id="strip-99">
      <div class="shot-add-tile" onclick="addShotToScene(99)">
        <span style="font-size:16px">+</span><span>Add Shot</span>
      </div>
    </div>`;
  container.appendChild(div);
  updateProgress();
  toast('Manual shot mode · click + Add Shot to begin');
}

function addScene() {
  const n = ++sceneCount;
  addSceneWithGenerate(n, `Scene ${n}`, n % 2 === 0 ? SHOTS_DATA_2 : SHOTS_DATA);
}

function updateProgress() {
  document.getElementById('progress-text').textContent = `${doneShots} / ${totalShots} shots complete`;
  const pct = totalShots > 0 ? (doneShots / totalShots) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast-el');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('main-ta').focus();
});
</script>
</body>
</html>
